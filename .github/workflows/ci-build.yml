name: CI Build

# Trigger CI on pull requests when relevant files change, and pushes to main
on:
  pull_request:
    paths:
      - ".github/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/**"
      - "tests/**"
      - "docker-compose.yml"
      - "docker-compose.*.yml"
      - "Dockerfile"
      - ".env.docker.example"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y software-properties-common
          sudo add-apt-repository universe
          echo "deb http://archive.ubuntu.com/ubuntu $(lsb_release -sc)-backports main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt update
          sudo apt install -y libgtk-3-dev build-essential pkg-config libglib2.0-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Check clippy lints
        run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y software-properties-common
          sudo add-apt-repository universe
          echo "deb http://archive.ubuntu.com/ubuntu $(lsb_release -sc)-backports main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt update
          sudo apt install -y libgtk-3-dev build-essential pkg-config libglib2.0-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2

      - name: Build (all targets, all features)
        run: cargo build --all-targets --all-features --release

      - name: Run unit tests
        run: cargo test --all-targets --all-features

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Copy env example
        run: cp .env.docker.example .env.docker

      - name: Run static Docker tests
        run: bash tests/docker/static.sh

      - name: Run unit tests for shell scripts
        run: bash tests/docker/unit.sh

      - name: Build CLI image
        run: ./scripts/docker/build.sh arnis

      - name: Run runtime Docker tests
        run: bash tests/docker/runtime.sh

      - name: Build headless GUI image
        run: ./scripts/docker/build.sh arnis-gui-headless

      - name: Run headless Docker tests
        run: bash tests/docker/headless.sh

      - name: Run Docker E2E CLI tests
        run: bash tests/docker/e2e-cli.sh

      - name: Run Docker E2E GUI tests
        run: bash tests/docker/e2e-gui.sh

      - name: Run Docker E2E export tests
        run: bash tests/docker/e2e-export.sh
